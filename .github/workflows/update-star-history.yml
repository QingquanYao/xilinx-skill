name: Update Star History Chart

on:
  schedule:
    # 每周一 03:17 UTC 刷新一次
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download star history SVGs
        env:
          # 带上 GITHUB_TOKEN 让 star-history.com 绕过匿名缓存、实时查 GitHub API
          SH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p docs
          curl -fsSL --retry 3 --retry-delay 5 \
            "https://api.star-history.com/svg?repos=QingquanYao/xilinx-skill&type=Date&token=${SH_TOKEN}" \
            -o docs/star-history.svg
          curl -fsSL --retry 3 --retry-delay 5 \
            "https://api.star-history.com/svg?repos=QingquanYao/xilinx-skill&type=Date&theme=dark&token=${SH_TOKEN}" \
            -o docs/star-history-dark.svg
          # 基础校验：必须是 SVG
          head -c 5 docs/star-history.svg | grep -q '<svg\|<?xml'
          head -c 5 docs/star-history-dark.svg | grep -q '<svg\|<?xml'

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/star-history.svg docs/star-history-dark.svg
          if git diff --staged --quiet; then
            echo "No changes in star history."
          else
            git commit -m "chore: refresh star history chart"
            git push
          fi
